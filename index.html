<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSJ Exchange Link Checker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
  :root{--bg:#0a0c10;--bg2:#0f1318;--border:#1e2730;--accent:#00e5ff;--ok:#39ff14;--fail:#ff3b3b;--warn:#ffcc00;--accent2:#ff6b35;--text:#c8d8e8;--dim:#4a6070}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
  h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);text-shadow:0 0 20px rgba(0,229,255,.4);text-align:center}
  .sub{font-size:.72rem;color:var(--dim);margin:6px 0 28px;letter-spacing:.1em;text-align:center}
  .card{width:100%;max-width:700px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:18px}
  .card-title{background:rgba(0,229,255,.05);border-bottom:1px solid var(--border);padding:9px 14px;font-size:.68rem;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .card-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);flex-shrink:0}
  .row{display:flex;gap:10px;padding:12px 14px;align-items:center;flex-wrap:wrap}
  label{font-size:.7rem;color:var(--dim);white-space:nowrap}
  input[type=text]{flex:1;min-width:180px;background:#080b0e;border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.76rem;outline:none;transition:border-color .2s}
  input[type=text]:focus{border-color:var(--accent)}
  textarea{width:100%;background:#080b0e;border:1px solid var(--border);border-radius:4px;padding:9px 10px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.76rem;resize:vertical;outline:none;min-height:90px;line-height:1.6}
  textarea:focus{border-color:var(--accent)}
  .pad{padding:0 14px 12px}.hint{font-size:.66rem;color:var(--dim);padding:0 14px 10px}
  .tab-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:4px 12px;font-family:'Share Tech Mono',monospace;font-size:.66rem;border-radius:3px;cursor:pointer;letter-spacing:.08em}
  .tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.05)}
  .tab-panel{display:none}.tab-panel.active{display:block}
  button.primary{background:var(--accent);color:#000;font-family:'Share Tech Mono',monospace;font-size:.78rem;font-weight:bold;letter-spacing:.1em;border:none;border-radius:4px;padding:9px 22px;cursor:pointer;text-transform:uppercase;transition:all .15s}
  button.primary:hover{box-shadow:0 0 12px rgba(0,229,255,.5)}
  button.primary:disabled{opacity:.4;cursor:not-allowed}
  button.sec{background:transparent;border:1px solid var(--dim);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.76rem;border-radius:4px;padding:8px 16px;cursor:pointer;letter-spacing:.08em}
  button.sec:hover{border-color:var(--text);color:var(--text)}
  /* Progress */

  .prog-wrap{height:3px;background:var(--border);margin:10px 14px;border-radius:2px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));width:0%;transition:width .3s}
  /* Log */
  .log-wrap{padding:0 14px 14px;max-height:260px;overflow-y:auto}
  .log-wrap::-webkit-scrollbar{width:4px}
  .log-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .log-entry{font-size:.74rem;line-height:1.5;display:flex;gap:8px;align-items:center;animation:fadeIn .2s ease;padding:8px 0;border-bottom:1px solid var(--border)}
  .log-entry:last-child{border-bottom:none}
  .log-entry .log-text{flex:1}
  .log-open,.log-copy{background:transparent;font-family:'Share Tech Mono',monospace;font-size:.62rem;padding:3px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:.06em;text-decoration:none;transition:all .15s;border:1px solid}
  .log-open.live{border-color:var(--ok);color:var(--ok)}
  .log-open.live:hover{background:rgba(57,255,20,.1)}
  .log-copy{border-color:var(--dim);color:var(--dim)}
  .log-copy:hover{border-color:var(--accent);color:var(--accent)}
  .log-copy.copied{border-color:var(--ok);color:var(--ok)}
  .copy-all-wrap{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
  .copy-all-btn{background:transparent;border:1px solid var(--dim);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.68rem;padding:5px 16px;border-radius:3px;cursor:pointer;letter-spacing:.08em;transition:all .15s}
  .copy-all-btn:hover{border-color:var(--accent);color:var(--accent)}
  .live-label{font-size:.68rem;color:var(--ok);letter-spacing:.12em;text-transform:uppercase;padding:10px 14px 4px;display:none}
  .sister-badge{font-size:.58rem;padding:2px 6px;border-radius:3px;border:1px solid var(--accent2);color:var(--accent2);margin-left:4px;white-space:nowrap;flex-shrink:0}
  .ts{color:var(--dim);flex-shrink:0;font-size:.63rem}
  .ok{color:var(--ok)}.fail{color:var(--fail)}.warn{color:var(--accent2)}.info{color:var(--warn)}.dim{color:var(--dim)}
  @keyframes fadeIn{from{opacity:0;transform:translateX(-3px)}to{opacity:1;transform:translateX(0)}}

  #noResult{display:none;padding:14px;text-align:center;color:var(--fail);font-size:.76rem}
  #logPanel{display:none;border-top:1px solid var(--border);padding:10px 14px 14px}
  .log-section-title{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px;margin-top:10px}
  .log-section-title:first-child{margin-top:0}
  .log-row{font-size:.72rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:8px}
  .log-row:last-child{border-bottom:none}
  .log-row .lr-url{flex:1;word-break:break-all}
  .log-row a{font-size:.6rem;padding:2px 8px;border-radius:3px;border:1px solid var(--ok);color:var(--ok);text-decoration:none;white-space:nowrap}
  .log-row a:hover{background:rgba(57,255,20,.1)}
</style>
</head>
<body>

<h1>⚡ DSJ Exchange Link Checker</h1>
<p class="sub">Checks all mirrors &amp; shows which ones are live</p>

<div style="display:flex;gap:10px;justify-content:center;margin-bottom:18px">
  <button class="primary" id="btnStart" onclick="startScan()">Check Link</button>
  <button class="sec" id="btnStop" onclick="stopScan()" disabled>■ Stop</button>
</div>

<div class="card" id="progressCard" style="display:none">
  <div class="card-title">Check Progress</div>

  <div style="display:flex;align-items:center;gap:8px;padding:0 14px;margin-bottom:4px"><div class="prog-wrap" style="flex:1;margin:0"><div class="prog-fill" id="progFill"></div></div><span id="progPct" style="font-size:.68rem;color:var(--dim);white-space:nowrap;min-width:36px;text-align:right">0%</span></div>
  <div class="live-label" id="liveLabel">Latest live links :</div>
  <div class="log-wrap" id="logWrap"></div>
  <div class="copy-all-wrap" id="copyAllWrap" style="display:none">
    <button class="copy-all-btn" onclick="copyAll()">Copy all live links</button>
  </div>
  <div id="noResult" style="display:none;padding:10px 14px 14px;font-size:.72rem"></div>
</div>

<div id="logToggleRow" style="display:none;text-align:center;margin:10px 0">
  <button class="sec" id="btnViewLog" onclick="toggleLog()">▼ Show Log</button>
</div>

<div id="logPanel" class="card" style="display:none;width:100%;max-width:700px">
  <div class="card-title">Scan Log</div>
  <div style="padding:10px 14px 14px;max-height:50vh;overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain" id="logModalBody"></div>
</div>

<script>
let aborted = false;
let liveUrls = [];
let allResults = [];
// ── Domain list loaded from Gist (auto-updated daily by GitHub Actions) ──────
const DOMAINS_GIST_URL = 'https://gist.githubusercontent.com/chaudohoang/3c7ffcea0fae3f99f7fce1d6adc2032b/raw/55de90ed1029bd6a54fbb3b86f00b259c09dc345/domains.txt';
let sisterDomains = new Set();
const suffixes = ['/h5/ios', '/h5', ''];

const LIVE_PATTERNS  = ['static/h5/second/', 'chart-loading-animation'];
const BLOCK_PATTERNS = [
  'id="cf-wrapper"', "id='cf-wrapper'",
  '/cdn-cgi/phish-bypass', '/cdn-cgi/styles/cf.errors',
  'challenges.cloudflare.com/turnstile',
  'suspected misleading website', 'suspected phishing site',
  'reported for potentially misrepresenting',
  'this claim has not been validated by cloudflare',
  'ignore & proceed', 'ignore &amp; proceed',
  'just a moment', 'cf-browser-verification',
  'cloudflare ray id', 'ddos protection by cloudflare',
  'performance &amp; security by cloudflare',
  'performance & security by cloudflare',
];

function ts() { return new Date().toLocaleTimeString('en-GB',{hour12:false}); }
let _deferredLogs = [];

function makeEntry(msg, cls, url, showCopy, isSister) {
  const el = document.createElement('div');
  el.className = 'log-entry';
  const openBtn = url ? '<a class="log-open live" href="' + url + '" target="_blank">open</a>' : '';
  const copyBtn = (url && showCopy)
    ? '<button class="log-copy" onclick="copyOne(this,\''+url+'\')">copy</button>' : '';
  const badge = isSister ? '<span class="sister-badge">sister</span>' : '';
  el.innerHTML = '<span class="ts">[' + ts() + ']</span>'
    + '<span class="log-text ' + (cls||'dim') + '">' + msg + '</span>'
    + badge + copyBtn + openBtn;
  return el;
}
function copyOne(btn, url) {
  navigator.clipboard.writeText(url.replace(/^https?:\/\//, '')).then(() => {
    btn.textContent = 'copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}
function copyAll() {
  navigator.clipboard.writeText(liveUrls.map(u=>u.replace(/^https?:\/\//, '')).join('\n')).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = 'Copy all live links'; }, 1500);
  });
}
function log(msg, cls) {
  const w = document.getElementById('logWrap');
  w.appendChild(makeEntry(msg, cls||'dim', null));
  w.scrollTop = w.scrollHeight;
}
function logLive(msg, url, isSister) {
  liveUrls.push(url);
  document.getElementById('liveLabel').style.display = 'block';
  document.getElementById('copyAllWrap').style.display = 'flex';
  document.getElementById('logToggleRow').style.display = 'block';
  const w = document.getElementById('logWrap');
  const el = makeEntry(msg, 'ok', url, true, isSister);
  const first = w.querySelector('.deferred');
  if (first) w.insertBefore(el, first); else w.appendChild(el);
  w.scrollTop = 0;
}
function logDeferred(msg, cls, url) { _deferredLogs.push({msg, cls: cls||'dim', url: url||null}); }
function flushDeferred() { _deferredLogs = []; }
function setProgress(n, t) {
  const pct = t > 0 ? Math.round(n/t*100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
}

function classify(html) {
  const b = html.toLowerCase();
  for (const p of LIVE_PATTERNS)  if (b.includes(p)) return 'live';
  for (const p of BLOCK_PATTERNS) if (b.includes(p)) return 'blocked';
  return 'unknown';
}

// ── Method 1: Direct CORS fetch (works if site has CORS headers) ─────────────
async function tryDirect(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(t);
    const text = await r.text();
    if (text.length > 50) return classify(text);
  } catch {}
  clearTimeout(t);
  return 'unknown';
}

// ── Method 2: Proxy (reads HTML, detects CF or DSJ content) ─────────────────
async function tryProxy(proxyUrl, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(proxyUrl, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) return 'unknown';
    const text = await r.text();
    if (text.length > 50) return classify(text);
  } catch {}
  clearTimeout(t);
  return 'unknown';
}

// ── Method 3: Image probe using CORRECT relative path ───────────────────────
// GIF is at ./chart-loading-animation.gif from the page.
// ./foo relative to https://domain/h5/ios  = /h5/chart-loading-animation.gif
// ./foo relative to https://domain/h5      = /chart-loading-animation.gif
// ./foo relative to https://domain/        = /chart-loading-animation.gif
// CF blocks the HTML page but allows static files at that path → false positive risk.
// So we use image probe ONLY as a tiebreaker with known-path awareness.
function gifProbe(url, ms) {
  return new Promise(resolve => {
    const img = new Image();
    const u = new URL(url);
    // Compute correct relative path for ./chart-loading-animation.gif
    const segments = u.pathname.replace(/\/$/, '').split('/');
    segments.pop(); // go up one directory (like ./ does)
    const gifPath = segments.join('/') + '/chart-loading-animation.gif';
    const probe = u.origin + gifPath + '?_=' + Date.now();
    let done = false;
    const fin = r => { if (!done) { done=true; img.src=''; resolve(r); } };
    const timer = setTimeout(() => fin('timeout'), ms);
    img.onload  = () => { clearTimeout(timer); fin('live'); };
    img.onerror = () => { clearTimeout(timer); fin('blocked'); };
    img.src = probe;
  });
}

// ── Combined check ────────────────────────────────────────────────────────────
async function checkUrl(url, timeoutMs) {
  const enc = encodeURIComponent(url);
  const ts  = Date.now();

  // Fire ALL methods simultaneously
  const [direct, p1, p2, p3, gif] = await Promise.all([
    tryDirect(url, timeoutMs),
    tryProxy(`https://api.allorigins.win/get?url=${enc}&t=${ts}`, timeoutMs).then(async (r) => {
      // allorigins wraps in JSON
      if (r !== 'unknown') return r;
      return 'unknown';
    }),
    tryProxy(`https://corsproxy.io/?url=${enc}`, timeoutMs),
    tryProxy(`https://api.codetabs.com/v1/proxy?quest=${enc}`, timeoutMs),
    gifProbe(url, timeoutMs),
  ]);

  // allorigins needs special JSON parsing - redo it properly
  const allOriginsResult = await (async () => {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      const r = await fetch(`https://api.allorigins.win/get?url=${enc}&t=${ts+1}`, { signal: ctrl.signal });
      clearTimeout(t);
      if (!r.ok) return 'unknown';
      const data = await r.json();
      const body = data.contents || '';
      if (body.length > 50) return classify(body);
    } catch {}
    clearTimeout(t);
    return 'unknown';
  })();

  const results = [direct, allOriginsResult, p2, p3, gif];
  const labels  = ['direct', 'allorigins', 'corsproxy', 'codetabs', 'gif'];

  // Three-way verdict:
  // 'live'    = a proxy confirmed real DSJ content in HTML
  // 'cf-warn' = a proxy reached the site but got a CF warning page (may work from user's browser)
  // 'dead'    = all methods timed out / got empty responses (truly unreachable)
  const contentReaders = [direct, allOriginsResult, p2, p3];
  const anyLive    = contentReaders.some(r => r === 'live');
  const anyBlocked = contentReaders.some(r => r === 'blocked');
  const anyRead    = contentReaders.some(r => r !== 'unknown');

  let verdict;
  if (anyLive)         verdict = 'live';
  else if (anyBlocked) verdict = 'blocked';  // proxy confirmed CF page
  else                 verdict = 'dead';     // nothing responded at all



  return verdict;
}

async function loadDomains() {
  if (!DOMAINS_GIST_URL || DOMAINS_GIST_URL === 'PASTE_YOUR_GIST_RAW_URL_HERE')
    throw new Error('Gist URL not configured — set DOMAINS_GIST_URL in the script.');
  const res = await fetch(DOMAINS_GIST_URL + '?_=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return (await res.text()).split('\n').map(d=>d.trim()).filter(d=>d&&!d.startsWith('#'));
}

async function startScan() {
  aborted = false;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStart').innerHTML = 'Checking...';
  document.getElementById('btnStop').disabled = false;
  document.getElementById('progressCard').style.display = 'block';
  document.getElementById('logWrap').innerHTML = ''; _deferredLogs = []; liveUrls = []; allResults = [];  const lb=document.getElementById('btnShowLog'); if(lb) lb.textContent='Show Log';
  document.getElementById('liveLabel').style.display='none';
  document.getElementById('copyAllWrap').style.display='none';
  document.getElementById('logToggleRow').style.display='none';
  document.getElementById('logPanel').style.display='none';
  const vl=document.getElementById('btnViewLog'); if(vl) vl.textContent='▼ Show Log';
  document.getElementById('noResult').style.display = 'none';
  document.getElementById('progFill').style.width = '0%'; document.getElementById('progPct').textContent = '0%';

  const timeoutMs = 8000;

  let domains;
  try { domains = await loadDomains(); }
  catch(e) { log('Error: '+e.message,'warn'); document.getElementById('btnStart').disabled=false; document.getElementById('btnStop').disabled=true; return; }

  const candidates = [];
  for (let si = 0; si < suffixes.length; si++)
    for (const domain of domains)
      candidates.push({ url: `https://${domain}${suffixes[si]}`, phase: si });

  const total = candidates.length;
  let completed = 0;
  setProgress(0, total);


  const results = new Array(total).fill(null);
  let winner = null;


  const promises = candidates.map((c, i) =>
    checkUrl(c.url, timeoutMs).then(verdict => {
      if (aborted) return;
      results[i] = verdict;
      completed++;
      setProgress(completed, total);

      const icon = verdict === 'live' ? '✓' : verdict === 'blocked' ? '⚠' : '✗';
      const cls  = verdict === 'live' ? 'ok'  : verdict === 'blocked' ? 'warn' : 'fail';
      allResults.push({url: c.url, verdict});
      if (verdict === 'live') {
        const dom = c.url.replace('https://','').split('/')[0];
        logLive('✓ ' + c.url.replace('https://',''), c.url, sisterDomains.has(dom));
      }
      else logDeferred(icon + ' [' + verdict + '] ' + c.url, cls, c.url);

      if (!winner) {
        for (let j = 0; j < total; j++) {
          if (results[j] === null) break;
          if (results[j] === 'live') { winner = candidates[j].url; break; }
        }
      }
    })
  );

  await Promise.all(promises);

  if (!winner && !aborted)
    for (let j = 0; j < total; j++)
      if (results[j] === 'live') { winner = candidates[j].url; break; }

  if (aborted) {
    log('Scan stopped.', 'info');
  } else if (winner) {
  } else {
    const blockedCount = results.filter(r => r === 'blocked').length;
    const noR = document.getElementById('noResult');
    noR.textContent = blockedCount > 0
      ? 'No live site found. ' + blockedCount + ' URL(s) are CF-blocked.'
      : 'No live site found — all URLs appear unreachable.';
    noR.style.color = 'var(--fail)';
    noR.style.display = 'block';
  }

  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStart').innerHTML = 'Check Link';
  document.getElementById('btnStop').disabled = true;
}

window.addEventListener("load", () => startScan());

function stopScan() { aborted=true; document.getElementById('btnStop').disabled=true; document.getElementById('btnStart').disabled=false; document.getElementById('btnStart').innerHTML='Check Link'; }


function renderLog() {
  const body = document.getElementById('logModalBody');
  const groups = {live: [], blocked: [], dead: []};
  allResults.forEach(r => { if (groups[r.verdict]) groups[r.verdict].push(r.url); });
  const labels = {live:{title:'✓ Live',cls:'ok'}, blocked:{title:'⚠ Blocked (CF)',cls:'warn'}, dead:{title:'✗ Dead',cls:'fail'}};
  body.innerHTML = '';
  Object.entries(labels).forEach(([key, meta]) => {
    const urls = groups[key];
    if (!urls.length) return;
    const sec = document.createElement('div');
    { const t=document.createElement('div'); t.style.cssText='font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;padding:10px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px'; const clrMap={ok:'var(--ok)',warn:'var(--accent2)',fail:'var(--fail)'}; t.style.color=clrMap[meta.cls]||'var(--text)'; t.textContent=meta.title+' ('+urls.length+')'; sec.appendChild(t); }
    urls.forEach(url => {
      const row = document.createElement('div');
      row.style.cssText = 'font-size:.72rem;padding:3px 0;font-family:Share Tech Mono,monospace';
      const display = url.replace('https://','');
      const colors = {ok:'var(--ok)', warn:'var(--accent2)', fail:'var(--fail)'};
      row.style.color = colors[meta.cls] || 'var(--text)';
      row.textContent = display;
      sec.appendChild(row);
    });
    body.appendChild(sec);
  });
  if (!allResults.length) body.innerHTML = '<p style="color:var(--dim);font-size:.72rem;padding:12px 0">No results yet.</p>';
}
function toggleLog() {
  const panel = document.getElementById('logPanel');
  const btn = document.getElementById('btnViewLog');
  const isOpen = panel.style.display !== 'none';
  if (isOpen) {
    panel.style.display = 'none';
    btn.textContent = '▼ Show Log';
  } else {
    renderLog();
    panel.style.display = 'block';
    btn.textContent = '▲ Hide Log';
  }
}
</script>
</body>
</html>
