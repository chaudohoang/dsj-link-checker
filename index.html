<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSJ Exchange Redirector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
  :root {
    --bg:#0a0c10;--bg2:#0f1318;--border:#1e2730;
    --accent:#00e5ff;--ok:#39ff14;--fail:#ff3b3b;--warn:#ffcc00;
    --text:#c8d8e8;--dim:#4a6070;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
  h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);text-shadow:0 0 20px rgba(0,229,255,.4);text-align:center}
  .sub{font-size:.72rem;color:var(--dim);margin:6px 0 28px;letter-spacing:.1em;text-align:center}
  .card{width:100%;max-width:680px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:18px}
  .card-title{background:rgba(0,229,255,.05);border-bottom:1px solid var(--border);padding:9px 14px;font-size:.68rem;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .card-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);flex-shrink:0}
  .row{display:flex;gap:10px;padding:12px 14px;align-items:center;flex-wrap:wrap}
  label{font-size:.7rem;color:var(--dim);white-space:nowrap}
  input[type=text]{flex:1;min-width:180px;background:#080b0e;border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.76rem;outline:none;transition:border-color .2s}
  input[type=text]:focus{border-color:var(--accent)}
  textarea{width:100%;background:#080b0e;border:1px solid var(--border);border-radius:4px;padding:9px 10px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.76rem;resize:vertical;outline:none;min-height:90px;line-height:1.6}
  textarea:focus{border-color:var(--accent)}
  .pad{padding:0 14px 12px}
  .hint{font-size:.66rem;color:var(--dim);padding:0 14px 10px}
  .tab-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:4px 12px;font-family:'Share Tech Mono',monospace;font-size:.66rem;border-radius:3px;cursor:pointer;letter-spacing:.08em}
  .tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.05)}
  .tab-panel{display:none}.tab-panel.active{display:block}
  button.primary{background:var(--accent);color:#000;font-family:'Share Tech Mono',monospace;font-size:.78rem;font-weight:bold;letter-spacing:.1em;border:none;border-radius:4px;padding:9px 22px;cursor:pointer;text-transform:uppercase;transition:all .15s}
  button.primary:hover{box-shadow:0 0 12px rgba(0,229,255,.5);transform:translateY(-1px)}
  button.primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  button.sec{background:transparent;border:1px solid var(--dim);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.76rem;border-radius:4px;padding:8px 16px;cursor:pointer;letter-spacing:.08em}
  button.sec:hover{border-color:var(--text);color:var(--text)}

  /* URL list */
  .url-list{padding:0 14px 14px;display:flex;flex-direction:column;gap:6px}
  .url-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:4px;border:1px solid var(--border);background:#080b0e;transition:all .2s;cursor:pointer;animation:fadeIn .2s ease}
  .url-row:hover{border-color:var(--accent);background:rgba(0,229,255,.03)}
  .url-row.current{border-color:var(--warn);background:rgba(255,204,0,.05);box-shadow:0 0 8px rgba(255,204,0,.15)}
  .url-row.opened{border-color:var(--dim)}
  .url-num{font-size:.66rem;color:var(--dim);width:20px;flex-shrink:0;text-align:right}
  .url-text{flex:1;font-size:.76rem;color:var(--text);word-break:break-all}
  .url-row.current .url-text{color:var(--warn)}
  .url-badge{font-size:.6rem;padding:2px 7px;border-radius:2px;border:1px solid;flex-shrink:0}
  .badge-curr{border-color:var(--warn);color:var(--warn)}
  .badge-open{border-color:var(--dim);color:var(--dim)}
  .badge-new{border-color:var(--ok);color:var(--ok)}
  .open-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.66rem;padding:3px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .open-btn:hover{background:rgba(0,229,255,.1)}
  .next-btn-wrap{padding:0 14px 14px;display:flex;gap:10px;align-items:center}
  .next-big{background:var(--ok);color:#000;font-family:'Share Tech Mono',monospace;font-weight:bold;font-size:.82rem;letter-spacing:.1em;border:none;border-radius:4px;padding:10px 28px;cursor:pointer;text-transform:uppercase;transition:all .15s;animation:pulse 1.5s infinite}
  .next-big:hover{box-shadow:0 0 16px rgba(57,255,20,.5);transform:translateY(-1px)}
  @keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(57,255,20,.3)}50%{box-shadow:0 0 16px rgba(57,255,20,.7)}}
  @keyframes fadeIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
  .status-bar{font-size:.7rem;color:var(--dim);padding:8px 14px;border-top:1px solid var(--border)}
  .exhausted{padding:14px;text-align:center;color:var(--fail);font-size:.78rem}
</style>
</head>
<body>

<h1>⚡ DSJ Exchange Redirector</h1>
<p class="sub">Finds a working mirror & opens it for you</p>

<!-- Config -->
<div class="card" id="configCard">
  <div class="card-title">Source</div>
  <div class="row">
    <label>List from:</label>
    <button class="tab-btn active" id="tabUrl" onclick="switchTab('url')">Remote URL</button>
    <button class="tab-btn" id="tabInline" onclick="switchTab('inline')">Inline</button>
  </div>
  <div class="tab-panel active" id="panelUrl">
    <div class="row">
      <label>URL:</label>
      <input type="text" id="listUrl"
        placeholder="https://chaudohoang.github.io/site-finder/domains.txt"
        value="https://chaudohoang.github.io/site-finder/domains.txt"/>
    </div>
    <div class="hint">Plain text, one domain per line. No https:// needed.</div>
  </div>
  <div class="tab-panel" id="panelInline">
    <div class="pad">
      <textarea id="inlineDomains" placeholder="dsj255.com&#10;dsj256.com&#10;dsj257.com">dsj255.com
dsj256.com
dsj257.com
dsj259.com
dsj260.com
dsj261.com</textarea>
    </div>
  </div>
  <div class="row">
    <button class="primary" id="btnLoad" onclick="loadAndShow()">▶ Load Sites</button>
    <button class="sec" onclick="resetAll()">↺ Reset</button>
  </div>
</div>

<!-- Site list -->
<div class="card" id="listCard" style="display:none">
  <div class="card-title">Candidates — try in order</div>
  <div class="url-list" id="urlList"></div>
  <div class="next-btn-wrap" id="nextWrap" style="display:none">
    <button class="next-big" id="btnNext" onclick="openNext()">→ Blocked? Try Next</button>
    <span style="font-size:.68rem;color:var(--dim)" id="nextLabel"></span>
  </div>
  <div class="status-bar" id="statusBar"></div>
  <div class="exhausted" id="exhausted" style="display:none">
    ✗ All candidates tried. Update the domain list and reload.
  </div>
</div>

<script>
let candidates = [];   // {url, el}
let currentIdx = -1;

function switchTab(tab) {
  document.getElementById('panelUrl').classList.toggle('active', tab === 'url');
  document.getElementById('panelInline').classList.toggle('active', tab === 'inline');
  document.getElementById('tabUrl').classList.toggle('active', tab === 'url');
  document.getElementById('tabInline').classList.toggle('active', tab === 'inline');
}

async function loadDomains() {
  const tab = document.querySelector('.tab-btn.active').id;
  if (tab === 'tabInline') {
    return document.getElementById('inlineDomains').value
      .split('\n').map(d=>d.trim()).filter(d=>d&&!d.startsWith('#'));
  }
  const url = document.getElementById('listUrl').value.trim();
  if (!url) throw new Error('Enter a URL or switch to Inline');
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.text()).split('\n').map(d=>d.trim()).filter(d=>d&&!d.startsWith('#'));
}

async function loadAndShow() {
  const btn = document.getElementById('btnLoad');
  btn.disabled = true; btn.textContent = 'Loading…';

  let domains;
  try { domains = await loadDomains(); }
  catch(e) { alert('Could not load domain list: ' + e.message); btn.disabled=false; btn.textContent='▶ Load Sites'; return; }

  // Build candidate list: bare → /h5 → /h5/ios for each domain
  const suffixes = ['', '/h5', '/h5/ios'];
  candidates = [];
  const listEl = document.getElementById('urlList');
  listEl.innerHTML = '';

  let n = 1;
  for (const suffix of suffixes) {
    for (const domain of domains) {
      const url = `https://${domain}${suffix}`;
      const row = document.createElement('div');
      row.className = 'url-row';
      row.innerHTML = `
        <span class="url-num">${n}</span>
        <span class="url-text">${url}</span>
        <button class="open-btn" onclick="openUrl(${candidates.length})">Open</button>`;
      listEl.appendChild(row);
      candidates.push({ url, el: row, opened: false });
      n++;
    }
  }

  document.getElementById('listCard').style.display = 'block';
  document.getElementById('configCard').style.display = 'none';

  // Auto-open the first one
  openNext();
}

function openUrl(idx) {
  const c = candidates[idx];
  if (!c) return;

  // Deactivate previous current
  if (currentIdx >= 0 && candidates[currentIdx]) {
    const prev = candidates[currentIdx];
    prev.el.className = 'url-row opened';
    prev.el.querySelector('.url-text').style.color = '';
    const oldBadge = prev.el.querySelector('.url-badge');
    if (oldBadge) oldBadge.remove();
    addBadge(prev.el, 'OPENED', 'badge-open');
  }

  currentIdx = idx;
  c.opened = true;

  // Highlight current
  c.el.className = 'url-row current';
  const oldBadge = c.el.querySelector('.url-badge');
  if (oldBadge) oldBadge.remove();
  addBadge(c.el, '← NOW', 'badge-curr');

  // Open in new tab
  window.open(c.url, '_blank');

  updateStatus();
}

function openNext() {
  const next = candidates.findIndex((c, i) => i > currentIdx);
  if (next === -1) {
    // Try from beginning if all opened, or show exhausted
    const notOpened = candidates.findIndex(c => !c.opened);
    if (notOpened === -1) {
      document.getElementById('exhausted').style.display = 'block';
      document.getElementById('nextWrap').style.display = 'none';
      return;
    }
    openUrl(notOpened);
  } else {
    openUrl(next);
  }
}

function addBadge(row, text, cls) {
  const b = document.createElement('span');
  b.className = 'url-badge ' + cls;
  b.textContent = text;
  row.insertBefore(b, row.querySelector('.open-btn'));
}

function updateStatus() {
  const opened = candidates.filter(c => c.opened).length;
  const total = candidates.length;
  const remaining = total - currentIdx - 1;
  document.getElementById('statusBar').textContent =
    `Opened ${opened} of ${total} candidates  •  ${remaining} remaining`;

  const nextWrap = document.getElementById('nextWrap');
  const nextLabel = document.getElementById('nextLabel');

  if (currentIdx < total - 1) {
    nextWrap.style.display = 'flex';
    const next = candidates[currentIdx + 1];
    nextLabel.textContent = `next: ${next ? next.url : ''}`;
  } else {
    nextWrap.style.display = 'none';
    document.getElementById('exhausted').style.display = 'block';
  }
}

function resetAll() {
  candidates = [];
  currentIdx = -1;
  document.getElementById('listCard').style.display = 'none';
  document.getElementById('configCard').style.display = 'block';
  document.getElementById('urlList').innerHTML = '';
  document.getElementById('exhausted').style.display = 'none';
  document.getElementById('btnLoad').disabled = false;
  document.getElementById('btnLoad').textContent = '▶ Load Sites';
}
</script>
</body>
</html>
